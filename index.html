<script>
const payload = JSON.parse(document.getElementById('data').textContent);
const allRows = payload.rows;
document.getElementById('title').textContent = payload.event.tournament + ' — ' + payload.event.name;
document.getElementById('subtitle').textContent = allRows.length + ' entrants';

const tbodyEl = document.getElementById('tbody');
const filterEl = document.getElementById('filter');
let sortKey = 'seed';
let sortDir = 1;

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function render() {
  const filter = filterEl.value.trim().toLowerCase();
  const rows = allRows
    .filter(r => !filter ||
      (r.name || '').toLowerCase().includes(filter) ||
      (r.prefix || '').toLowerCase().includes(filter) ||
      (r.country || '').toLowerCase().includes(filter))
    .slice()
    .sort((a, b) => {
      let av = a[sortKey], bv = b[sortKey];
      if (sortKey === 'seed') {
        av = av ?? Infinity; bv = bv ?? Infinity;
        return (av - bv) * sortDir;
      }
      return String(av || '').localeCompare(String(bv || '')) * sortDir;
    });

  tbodyEl.innerHTML = rows.map(r => `
    <tr>
      <td class="seed-col">${r.seed ?? '—'}</td>
      <td class="name-col">${escapeHtml(r.name || '')}</td>
      <td class="meta-col">${escapeHtml(r.prefix || '')}</td>
      <td class="meta-col">${escapeHtml(r.country || '')}</td>
    </tr>
  `).join('');
}

document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const k = th.dataset.sort;
    if (sortKey === k) sortDir = -sortDir;
    else { sortKey = k; sortDir = 1; }
    render();
  });
});

filterEl.addEventListener('input', render);
render();
</script>
